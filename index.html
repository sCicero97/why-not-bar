<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Why Not — Barra</title>
  <meta name="theme-color" content="#0b0b0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Why Not"/>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="icon" href="./Logo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./Logo.png"/>
  <link rel="stylesheet" href="./styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app" class="app-shell" style="display:none">

  <header class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>Why Not</h1>
        <p id="eventName">Cargando evento…</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="notif-btn sos-btn" id="helpBtn" title="Pedir ayuda en barra">🆘</button>
      <div class="user-dropdown">
        <button class="user-dropdown-btn" id="userDropdownBtn">
          <span id="userChip"></span> ▾
        </button>
        <div class="user-dropdown-menu" id="userDropdownMenu">
          <button id="logoutBtn">Cerrar sesión</button>
        </div>
      </div>
    </div>
  </header>

  <section class="summary-grid">
    <div class="summary-card">
      <span class="summary-label">Abiertas</span>
      <strong id="openTotal">$ 0</strong>
    </div>
    <div class="summary-card" style="background:#121815">
      <span class="summary-label">Cerradas</span>
      <strong id="paidTotal">$ 0</strong>
    </div>
    <div class="summary-card" style="background:#131313">
      <span class="summary-label">Tragos 160</span>
      <strong id="all160">0</strong>
    </div>
    <div class="summary-card" style="background:#131313">
      <span class="summary-label">Tragos 260</span>
      <strong id="all260">0</strong>
    </div>
    <div class="summary-card" style="background:#131313">
      <span class="summary-label">Tragos 360</span>
      <strong id="all360">0</strong>
    </div>
    <div class="summary-card" style="background:#181818">
      <span class="summary-label">Total general</span>
      <strong id="grandTotal">$ 0</strong>
    </div>
  </section>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="cuentas">Cuentas abiertas</button>
    <button class="tab-btn" data-tab="pagas">Historial cobradas</button>
  </nav>

  <main>
    <section id="tab-cuentas" class="tab-panel active">
      <div class="panel-header">
        <h2>Cuentas</h2>
        <div class="panel-tools" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="search-wrap">
            <input id="searchInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Buscar ID…" autocomplete="off"/>
            <button id="clearSearchBtn" class="clear-search-btn">✕</button>
          </div>
        </div>
      </div>
      <p class="hold-hint">Mantené <strong>0,5 s</strong> → agregar trago &nbsp;·&nbsp; <strong>2 s</strong> → quitar trago &nbsp;·&nbsp; <strong>1 s</strong> en Cerrar → cobrar</p>
      <div id="accountsList" class="accounts-list"></div>
    </section>

    <section id="tab-pagas" class="tab-panel">
      <div class="panel-header"><h2>Historial de cuentas cobradas</h2></div>
      <div class="paid-table-wrap">
        <table class="paid-table">
          <thead>
            <tr><th>ID</th><th>Nombre</th><th>Total</th><th>#160</th><th>#260</th><th>#360</th><th>Cobrada por</th><th>Hora</th><th>Foto</th></tr>
          </thead>
          <tbody id="paidTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script src="./shared.js"></script>
<script src="./app.js"></script>
</body>
</html>
