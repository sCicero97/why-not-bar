<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Why Not</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Why Not"/>
  <link rel="icon" href="./Logo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./Logo.png"/>
  <link rel="stylesheet" href="./styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<!-- SVG sprite mínimo para el login -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/><path d="M10 17l-5-5 5-5"/><path d="M5 12h11"/>
    </symbol>
  </defs>
</svg>

<div id="app" style="display:none"></div>
<div id="loginRoot"></div>

<div id="bootLoading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#9a9aa0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  Cargando…
</div>

<script src="./shared.js"></script>
<script>
  // Router universal: si hay sesión, redirige según rol. Si no, muestra login.
  (async () => {
    try {
      const db = getDb();
      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        // Sin sesión → mostrar login. Al autenticar, redirectToRoleApp maneja el salto.
        document.getElementById('bootLoading').remove();
        showLoginModal(['admin', 'bar', 'door']);
        return;
      }
      const { data: profile } = await db
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();
      const role = profile?.role || 'bar';
      redirectToRoleApp(role);
    } catch (e) {
      console.error('Bootstrap error:', e);
      document.getElementById('bootLoading').textContent = 'Error al iniciar. Recargá la página.';
    }
  })();
</script>
</body>
</html>
